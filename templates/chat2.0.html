<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Dark Mode</title>
    <style>
        /* Modern Dark Theme Styling */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #chatContainer {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #chatBox {
            height: 500px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* The "Bubbles" */
        #chatBox p {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 18px;
            margin: 0;
            line-height: 1.4;
            font-size: 0.95rem;
            word-wrap: break-word;
            position: relative;
        }

        /* Received Messages (Left) */
        #chatBox p {
            align-self: flex-start;
            background: #333333;
            color: #ffffff;
            border-bottom-left-radius: 4px;
        }

        /* Sent Messages (Right) 
           Note: This styling targets specific logic if you were to add classes, 
           but for now, we apply a general style. To differentiate Sent vs Received 
           completely, you'd usually add a class in JS. 
           I have styled the "received" as default. */
        
        .input-area {
            display: flex;
            padding: 15px;
            background: #252525;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: #333;
            border: none;
            padding: 12px 15px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        /* Custom Scrollbar */
        #chatBox::-webkit-scrollbar {
            width: 6px;
        }
        #chatBox::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="chatContainer">
        <div id="chatBox"></div>
        <div class="input-area">
            <input id="messageBox" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</body>
<script>
    let myId = Math.floor(Math.random() * 1000);

    let socket = io();
    function triggerConnection(){
        console.log('connected');
    }
    socket.on('connect', triggerConnection)
    function sendMessage(){
        let message = document.getElementById('messageBox').value;
        let data = {
            id: myId,
            message: message
        }
        socket.emit('message', data);
        document.getElementById('messageBox').value = '';
    }
    //recieve mesage from server
    socket.on('message', handle_message)
        function handle_message(data){
            console.log(data)
            let chatBox = document.getElementById('chatBox');
            if(data.id === myId){
                chatBox.insertAdjacentHTML('beforeend', `<p style="align-self: flex-end; background: #007bff; border-bottom-left-radius: 18px; border-bottom-right-radius: 4px;">${data.message}</p>`);
            } else {
                chatBox.insertAdjacentHTML('beforeend', `<p>${data.message}</p>`);
            }
        }
</script>
</html>
